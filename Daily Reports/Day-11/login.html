<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uplink Portal - Aero-Guard Drone Console</title>
    <!-- Linking external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for elite futuristic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Matrix grid background element -->
    <div class="grid-overlay"></div>
    <div class="glow-pulse"></div>

    <div class="container relative-z">
        <!-- Brand Header Section -->
        <header class="main-header">
            <div class="brand-icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-spin text-cyan"><circle cx="12" cy="12" r="10"></circle><path d="M16.2 7.8 12 12l-4.2 4.2"></path><path d="m16.2 16.2-8.4-8.4"></path></svg>
            </div>
            <h1>AERO-GUARD <span class="text-cyan">TELEMETRY</span></h1>
            <p class="subtitle">SMART DRONE HEALTH MONITORING SYSTEM</p>
        </header>

        <!-- Dynamic Login card component -->
        <main class="login-card">
            <!-- Retro terminal style targeting brackets -->
            <div class="corner-bracket top-left"></div>
            <div class="corner-bracket top-right"></div>
            <div class="corner-bracket bottom-left"></div>
            <div class="corner-bracket bottom-right"></div>

            <div class="card-header">
                <h2>AUTHENTICATE OPERATOR</h2>
                <p>Initialize secure uplink socket handshake</p>
            </div>

            <!-- Intercept login submit to perform validation -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">OPERATOR ID</label>
                    <div class="input-container">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"></path></svg>
                        <input type="text" id="username" name="username" placeholder="e.g. admin" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">ACCESS CODE</label>
                    <div class="input-container">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" name="password" placeholder="••••••••••••" required autocomplete="current-password">
                        <button type="button" id="btnTogglePassword" class="btn-toggle-eye">
                            <!-- Toggle Eye icon -->
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <svg id="eyeClosed" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Custom inline dynamic warning notifications container -->
                <div id="errorNotification" class="error-box hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-rose"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <span id="errorMessage">Invalid Operator credentials.</span>
                </div>

                <div class="submit-action">
                    <button type="submit" id="btnLogin" class="btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                        <span>ESTABLISH SECURE LINK</span>
                    </button>
                </div>
            </form>

            <!-- Demonstration Auto-fill card helpful reminder -->
            <div class="demo-badge">
                <div class="demo-header">
                    <span>DEMONSTRATION RUNS</span>
                    <button type="button" id="btnAutoFill" class="autofill-trigger">Auto-Fill</button>
                </div>
                <div class="demo-credentials flex-col">
                    <div><span>Operator:</span> <strong class="text-white">admin</strong></div>
                    <div><span>Passphrase:</span> <strong class="text-white">drone-secure-7</strong></div>
                </div>
            </div>
        </main>

        <footer class="portal-footer">
            SYSTEM CONSOLE V4.2.1 • SECURE HANDSHAKE RSA-4096
        </footer>
    </div>

    <!-- Script source linking -->
    <script src="script.js"></script>
</body>
</html>
